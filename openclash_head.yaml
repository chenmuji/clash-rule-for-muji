allow-lan: true
mode: rule
log-level: info
# 允许局域网内所有设备访问 Clash 的控制面板
external-controller: '0.0.0.0:9090'

# 如果需要为控制面板设置密码，可以取消下面这行的注释（把 secret 改为你自己的密码）
# secret: 'your_password'

dns:
  enable: true
  ipv6: false
  # 已完美对齐你 OpenClash 界面上的 DNS 监听端口
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 用于解析 nameserver 域名的基础 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  # 国内域名及未匹配域名的解析 DNS（引入了 DoH 加密 DNS 防污染）
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alicdn.com/dns-query
    - https://doh.pub/dns-query

  # 优质的 Fake-IP 过滤列表，确保国内音游、主机网络、时间同步不走代理
  # 竖着写的 fake-ip-filter 列表
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - '*.home.arpa'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'time1.*.com'
    - 'time2.*.com'
    - 'time3.*.com'
    - 'time4.*.com'
    - 'time5.*.com'
    - 'time6.*.com'
    - 'time7.*.com'
    - 'ntp.*.com'
    - 'ntp1.*.com'
    - 'ntp2.*.com'
    - 'ntp3.*.com'
    - 'ntp4.*.com'
    - 'ntp5.*.com'
    - 'ntp6.*.com'
    - 'ntp7.*.com'
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - 'time1.cloud.tencent.com'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'swscan.apple.com'
    - 'mesu.apple.com'
    - 'music.163.com'
